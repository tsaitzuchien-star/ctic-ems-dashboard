        // ==========================================
        // 核心邏輯：從 GAS API 獲取資料 (破除快取版)
        // ==========================================
        async function fetchPowerData() {
            const statusIndicator = document.getElementById('statusText');
            try {
                statusIndicator.innerHTML = '<i class="fa-solid fa-wifi mr-1 animate-pulse text-blue-400"></i> 即時資料抓取中...';
                statusIndicator.className = "text-sm text-blue-400 mt-1 font-mono";

                // 💡 關鍵升級：在網址後面加上時間戳，強迫瀏覽器每次都去要最新的資料！
                const noCacheUrl = API_URL + "?t=" + new Date().getTime();
                const response = await fetch(noCacheUrl);
                livePowerData = await response.json();
                
                statusIndicator.innerHTML = `<i class="fa-solid fa-cloud-arrow-down mr-1 text-emerald-400"></i> API 資料已同步 (${new Date().toLocaleTimeString()})`;
                statusIndicator.className = "text-sm text-emerald-400 mt-1 font-mono";
                
                renderCards(); 
            } catch (error) {
                console.error("抓取資料失敗:", error);
                statusIndicator.innerHTML = '<i class="fa-solid fa-triangle-exclamation mr-1 text-red-400"></i> 連線失敗，顯示靜態資料';
                statusIndicator.className = "text-sm text-red-400 mt-1 font-mono";
            }
        }

        // ==========================================
        // 核心邏輯：解析字串並計算用電 (全格式相容防呆版)
        // ==========================================
        function calculateKwh(circuitString) {
            if (!circuitString || circuitString === '-') return '-';
            if (Object.keys(livePowerData).length === 0) return circuitString; 

            const circuits = circuitString.split(' / ');
            let totalSum = 0;
            let monthlySum = 0;
            let hasData = false;

            circuits.forEach(c => {
                let rawString = c.trim();
                
                // 格式1: "R1B (20迴)"
                let keyFormat1 = rawString; 
                // 格式2: "R1B_20"
                let keyFormat2 = rawString.replace(/\s*\(/, '_').replace(/迴\)/, ''); 
                
                let val = livePowerData[keyFormat1];
                if (val === undefined) val = livePowerData[keyFormat2];

                // 💡 關鍵升級：如果 GAS 還是舊版巢狀格式 {"R1B": {"20": 17713}}，也能自動解譯！
                if (val === undefined) {
                    let parts = keyFormat2.split('_');
                    if (parts.length >= 2) {
                        let panel = parts[0];
                        let circ = parts.slice(1).join('_');
                        if (livePowerData[panel] && livePowerData[panel][circ] !== undefined) {
                            val = livePowerData[panel][circ];
                        }
                    }
                }

                if (val !== undefined) {
                    hasData = true;
                    if (typeof val === 'object' && val !== null) {
                        totalSum += (Number(val.total) || 0);
                        monthlySum += (Number(val.monthly) || 0);
                    } else {
                        totalSum += (Number(val) || 0);
                    }
                }
            });

            if (!hasData) return circuitString;

            let resultHTML = `<div class="flex flex-col items-end leading-tight">`;
            if (monthlySum > 0) {
                resultHTML += `<span class="text-emerald-400 font-bold text-base drop-shadow-[0_0_8px_rgba(52,211,153,0.8)]" title="本月用電">${monthlySum.toFixed(1)} <span class="text-[10px] font-normal">kWh</span></span>`;
                resultHTML += `<span class="text-slate-500 text-[10px]" title="歷史總累計">${totalSum.toFixed(1)} kWh (總計)</span>`;
            } else {
                resultHTML += `<span class="text-emerald-400 font-bold text-base drop-shadow-[0_0_8px_rgba(52,211,153,0.8)]" title="歷史總累計">${totalSum.toFixed(1)} <span class="text-[10px] font-normal">kWh</span></span>`;
            }
            resultHTML += `</div>`;

            return resultHTML;
        }

        // 繪製圓餅圖
        const ctx = document.getElementById('typeChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: { labels: ['插座', '照明', '空調', '動力'], datasets: [{ data: [754, 687, 187, 379], backgroundColor: ['#f59e0b', '#fde047', '#38bdf8', '#f87171'], borderWidth: 0, hoverOffset: 4 }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { color: '#cbd5e1', boxWidth: 10, font: {size: 10} } } }, cutout: '70%' }
        });

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-500/20', 'text-blue-300', 'font-bold', 'border-blue-400');
                btn.classList.add('hover:bg-slate-800', 'text-slate-400', 'border-transparent');
            });
            const activeBtn = document.getElementById('tab-' + tab);
            if(activeBtn) {
                activeBtn.classList.remove('hover:bg-slate-800', 'text-slate-400', 'border-transparent');
                activeBtn.classList.add('bg-blue-500/20', 'text-blue-300', 'font-bold', 'border-blue-400');
            }
            renderCards();
        }

        // ==========================================
        function renderCircuitRow(iconClass, colorClass, label, circuitStr) {
            let content = `<span class="text-xs text-slate-600 italic">無配置</span>`;
            
            if (circuitStr && circuitStr !== '-') {
                const calculatedHTML = calculateKwh(circuitStr);
                
                if (calculatedHTML !== circuitStr) {
                    // 如果成功算出數字並轉為 HTML，直接顯示 (不加 badge 背景框)
                    content = `<span class="max-w-[70%] text-right font-mono" title="包含迴路: ${circuitStr}">${calculatedHTML}</span>`;
                } else {
                    // 若抓不到資料或尚未連線，維持原本的藍色 Badge 標籤
                    content = `<span class="circuit-badge truncate max-w-[65%] text-right font-mono" title="${circuitStr}">${circuitStr}</span>`;
                }
            }

            return `
            <div class="flex justify-between items-center group/item pt-1">
                <span class="text-slate-300 flex items-center text-sm font-medium"><i class="${iconClass} w-6 ${colorClass} group-hover/item:scale-110 transition"></i>${label}</span>
                ${content}
            </div>`;
        }

        function renderCards() {
            const container = document.getElementById('cardsContainer');
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            container.innerHTML = '';
            
            if (currentTab === 'Calc') {
                container.innerHTML = `
                <div class="glass-card p-6 bg-gradient-to-br from-slate-800/90 to-blue-900/60 border-blue-500/40 col-span-full md:col-span-2 xl:col-span-2 shadow-2xl">
                    <h3 class="text-2xl font-bold mb-2 text-amber-400 drop-shadow-md"><i class="fa-solid fa-calculator mr-3"></i>空調佔比分攤引擎 (展示版)</h3>
                    <p class="text-sm text-slate-300 mb-8 border-b border-slate-600 pb-4">系統將抓取本月「公設與機房」總度數，並依據左側各廠商空調耗電比例進行精密費用拆解。</p>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="text-sm text-blue-300 mb-2 block font-bold">1. 輸入台電總帳單金額</label>
                            <input type="text" value="$ 1,520,400" disabled class="w-full bg-slate-900 border border-slate-600 rounded px-4 py-3 text-white font-mono text-xl shadow-inner">
                        </div>
                        <div>
                            <label class="text-sm text-emerald-400 mb-2 block font-bold">2. 系統初估公設待攤提總額</label>
                            <input type="text" value="$ 45,612 (約佔 3%)" disabled class="w-full bg-emerald-900/20 border border-emerald-600/50 rounded px-4 py-3 text-emerald-300 font-mono text-xl shadow-inner">
                        </div>
                    </div>
                    <div class="p-4 bg-slate-900/60 rounded-lg mb-6 space-y-4 text-sm font-mono border border-slate-700">
                        <div class="flex justify-between items-center text-slate-400"><span>A108 實驗室空調佔比試算:</span><span class="text-white bg-slate-700 px-2 py-1 rounded">12.4%</span></div>
                        <div class="flex justify-between items-center border-t border-slate-700 pt-4 font-bold text-lg"><span class="text-blue-300">A108 本月公設應攤提:</span><span class="text-white bg-blue-500/30 px-4 py-2 rounded border border-blue-400/50 shadow-[0_0_10px_rgba(59,130,246,0.3)]">$ 5,655</span></div>
                    </div>
                    <button class="w-full bg-blue-500 hover:bg-blue-400 text-white font-bold py-3 px-4 rounded-lg transition shadow-[0_0_20px_rgba(59,130,246,0.4)] transform hover:-translate-y-0.5 text-lg">
                        <i class="fa-solid fa-microchip mr-2"></i>啟動全區自動結算演算
                    </button>
                </div>`;
                return;
            }

            let filtered = roomData.filter(r => r.building === currentTab);
            if (query) {
                filtered = filtered.filter(r => r.room_id.toLowerCase().includes(query) || r.company.toLowerCase().includes(query));
            }

            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-slate-500 py-16"><i class="fa-solid fa-magnifying-glass-location text-5xl mb-4 block opacity-50"></i><p class="text-xl">此分頁找不到符合的空間資料</p></div>`;
                return;
            }

            filtered.forEach(room => {
                let badgeColor = "bg-slate-500/30 text-slate-300";
                if (room.type === '辦公室') badgeColor = "bg-emerald-500/30 text-emerald-300";
                if (room.type === '實驗室') badgeColor = "bg-blue-500/30 text-blue-300";
                if (room.type === '機房' || room.type === '公共空間') badgeColor = "bg-amber-500/30 text-amber-300";

                const card = `
                <div class="glass-card p-5 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 ${badgeColor} px-3 py-1.5 rounded-bl-xl text-xs font-bold shadow-sm backdrop-blur-md border-b border-l border-white/10">${room.type}</div>
                    <h2 class="text-2xl font-black mb-1 text-white group-hover:text-blue-400 transition drop-shadow-md">${room.room_id}</h2>
                    <p class="text-slate-400 text-sm mb-4 pb-3 border-b border-slate-700/60 truncate font-medium" title="${room.company}">${room.company || '<span class="italic text-slate-600">無進駐單位</span>'}</p>
                    
                    <div class="space-y-2 mt-4">
                        ${renderCircuitRow('fa-solid fa-snowflake', 'text-blue-400', '空調', room.circuits['空調'])}
                        ${renderCircuitRow('fa-solid fa-plug', 'text-amber-400', '插座', room.circuits['插座'])}
                        ${renderCircuitRow('fa-solid fa-gears', 'text-red-400', '動力', room.circuits['動力'])}
                        ${renderCircuitRow('fa-regular fa-lightbulb', 'text-yellow-300', '照明', room.circuits['照明'])}
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', card);
            });
        }

        // 初始化：開啟 A 棟並立即觸發資料抓取
        switchTab('A');
        fetchPowerData();
        
        // 設定每 5 分鐘背景自動抓取更新一次資料
        setInterval(fetchPowerData, 5 * 60 * 1000);

    </script>
</body>
</html>
